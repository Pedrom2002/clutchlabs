apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cs2-analytics-secrets
  namespace: cs2-analytics
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: cs2-analytics-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: cs2/production/jwt, property: secret }
    - secretKey: DATABASE_URL
      remoteRef: { key: cs2/production/db, property: url }
    - secretKey: REDIS_URL
      remoteRef: { key: cs2/production/redis, property: url }
    - secretKey: STRIPE_SECRET_KEY
      remoteRef: { key: cs2/production/stripe, property: secret_key }
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef: { key: cs2/production/stripe, property: webhook_secret }
    - secretKey: SENTRY_DSN
      remoteRef: { key: cs2/production/sentry, property: dsn_backend }
    - secretKey: NEXT_PUBLIC_SENTRY_DSN
      remoteRef: { key: cs2/production/sentry, property: dsn_frontend }
    - secretKey: S3_ACCESS_KEY
      remoteRef: { key: cs2/production/s3, property: access_key }
    - secretKey: S3_SECRET_KEY
      remoteRef: { key: cs2/production/s3, property: secret_key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-webhooks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-webhooks
    creationPolicy: Owner
  data:
    - secretKey: slack_webhook_url
      remoteRef: { key: cs2/production/alerts, property: slack_webhook }
    - secretKey: pagerduty_service_key
      remoteRef: { key: cs2/production/alerts, property: pagerduty_key }
