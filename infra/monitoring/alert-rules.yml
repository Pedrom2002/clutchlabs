groups:
  - name: cs2-backend
    interval: 30s
    rules:
      - alert: BackendInstanceDown
        expr: up{job="cs2-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for >2m."

      - alert: BackendHighErrorRate
        expr: |
          (sum(rate(http_requests_total{job="cs2-backend",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="cs2-backend"}[5m]))) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backend 5xx error rate >5%"
          description: "5xx ratio has been above 5% for 5 minutes."

      - alert: BackendHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="cs2-backend"}[5m]))
          ) > 1.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend p95 latency >1s"
          description: "p95 has been >1s for 10 minutes."

      - alert: MLInferenceSlow
        expr: |
          histogram_quantile(0.95,
            sum by (le, model) (rate(ml_inference_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ML inference p95 >500ms ({{ $labels.model }})"
          description: "Model {{ $labels.model }} inference is degraded."

  - name: cs2-postgres
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres is down"

      - alert: PostgresConnectionPoolSaturation
        expr: |
          (sum(pg_stat_activity_count) by (instance)
          /
          max(pg_settings_max_connections) by (instance)) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection pool >80% used"
          description: "{{ $labels.instance }} is close to max_connections."

      - alert: PostgresReplicationLag
        expr: pg_replication_lag_seconds > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres replication lag >60s"

  - name: cs2-redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisMemoryHigh
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory >90%"

  - name: cs2-ml
    rules:
      - alert: MLFeatureDrift
        expr: ml_feature_drift > 0.3
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "ML feature drift on {{ $labels.model }}/{{ $labels.feature }}"
          description: "Live distribution of {{ $labels.feature }} has drifted from baseline (score {{ $value }})."

      - alert: MLFeatureDriftCritical
        expr: ml_feature_drift > 0.6
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Severe ML feature drift on {{ $labels.model }}/{{ $labels.feature }}"
