[project]
name = "cs2-demo-parser"
version = "0.1.0"
description = "AI CS2 Analytics — Demo Parser (Awpy wrapper)"
requires-python = ">=3.12"
dependencies = [
    "awpy>=2.0.0",
    "pandas>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
