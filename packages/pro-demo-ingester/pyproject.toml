[project]
name = "cs2-pro-demo-ingester"
version = "0.1.0"
description = "AI CS2 Analytics — Pro Demo Ingestion Pipeline"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.0",
    "selectolax>=0.3.0",
    "rarfile>=4.2",
    "tqdm>=4.60.0",
    "cloudscraper>=1.2.0",
    "playwright>=1.58.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
