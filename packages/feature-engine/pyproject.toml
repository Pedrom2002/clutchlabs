[project]
name = "cs2-feature-engine"
version = "0.1.0"
description = "AI CS2 Analytics — Feature Extraction"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26.0",
    "pandas>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/feature_engine"]
