[project]
name = "cs2-ml-models"
version = "0.1.0"
description = "AI CS2 Analytics — ML Models"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.2.0",
    "scikit-learn>=1.5.0",
    "numpy>=1.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
